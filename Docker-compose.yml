services:
  app:
    image: php:8.4.20-fpm
    volumes:
      - ./:/app
    networks:
      - abelo-host
    depends_on:
      - mysql
  mysql:
    image: mysql:latest
    env_file:
      - .env
    volumes:
      - /mysql_data:/var/lib/mysql
    ports:
      - 127.0.0.1:${MYSQL_PORT:-3306}:3306
    networks:
      - abelo-host
  nginx:
    image: nginx:latest
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 127.0.0.1:${NGINX_PORT:-80}:80
    networks:
      - abelo-host

networks:
  abelo-host:
    ipam:
      driver: default
      config:
        - subnet: "172.16.238.0/24"